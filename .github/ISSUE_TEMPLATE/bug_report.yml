name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start the logger with `helmlog run`
        2. Navigate to http://hostname/
        3. Click "Start Race"
        4. See error in ...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Raspberry Pi (production)
        - Mac (development)
        - Other Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the version you're running.
      placeholder: e.g. 36ead41

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (journalctl, browser console, etc.)
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — screenshots, hardware setup, Signal K version, etc.
